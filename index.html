<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词语迷宫</title>
    <!-- 引入 Tailwind CSS 进行快速样式布局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用于在浏览器中解析 JSX 语法 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, Fragment } = React;

        // 内置 SVG 图标组件 (替代原本的 lucide-react)
        const Camera = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>);
        const MapPin = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>);
        const RefreshCw = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);
        const Volume2 = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>);
        const VolumeX = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>);
        const Info = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>);

        // 节点数据保持不变，拼音保持深黑色
        const nodes = [
          { id: 's', char: '牛车水', pinyin: 'niú chē shuǐ', r: 2, c: 0 },
          { id: 'ju', char: '聚', pinyin: 'jù', r: 2, c: 1 },
          { id: 'ji', char: '集', pinyin: 'jí', r: 2, c: 2 },
          { id: 'he', char: '合', pinyin: 'hé', r: 3, c: 2 },
          { id: 'zuo', char: '作', pinyin: 'zuò', r: 4, c: 2 },
          { id: 'yong', char: '用', pinyin: 'yòng', r: 5, c: 1 },
          { id: 'gong', char: '功', pinyin: 'gōng', r: 5, c: 2 },
          { id: 'ke', char: '课', pinyin: 'kè', r: 5, c: 3 },
          { id: 'ben', char: '本', pinyin: 'běn', r: 4, c: 3 },
          { id: 'di', char: '地', pinyin: 'dì', r: 4, c: 4 },
          { id: 'tu', char: '图', pinyin: 'tú', r: 1, c: 5 },
          { id: 'hua', char: '画', pinyin: 'huà', r: 0, c: 5 },
          { id: 'jia', char: '家', pinyin: 'jiā', r: 2, c: 6 },
          { id: 'zhang', char: '长', pinyin: 'zhǎng', r: 3, c: 7 },
          { id: 'da', char: '大', pinyin: 'dà', r: 3, c: 6 },
          { id: 'li_true', char: '力', pinyin: 'lì', r: 5, c: 6 },
          { id: 'qi', char: '气', pinyin: 'qì', r: 6, c: 6 },
          { id: 'qiu', char: '球', pinyin: 'qiú', r: 5, c: 7 },
          { id: 'mi', char: '迷', pinyin: 'mí', r: 6, c: 7 },
          { id: 'gong2', char: '宫', pinyin: 'gōng', r: 6, c: 8 },
          { id: 'e2', char: '乌节路', pinyin: 'wū jié lù', r: 6, c: 9 },

          // 干扰字
          { id: 'xing1', char: '星', pinyin: 'xīng', r: 3, c: 1 },
          { id: 'ye', char: '业', pinyin: 'yè', r: 4, c: 1 },
          { id: 'li_false', char: '力', pinyin: 'lì', r: 3, c: 3 },
          { id: 'qian', char: '前', pinyin: 'qián', r: 5, c: 5 },
          { id: 'fang', char: '方', pinyin: 'fāng', r: 6, c: 5 },
          { id: 'xing2', char: '星', pinyin: 'xīng', r: 5, c: 4 },
          { id: 'ye2', char: '夜', pinyin: 'yè', r: 4, c: 5 },
          { id: 'po', char: '婆', pinyin: 'pó', r: 2, c: 5 },
          { id: 'jin', char: '进', pinyin: 'jìn', r: 2, c: 7 },
          { id: 'yi', char: '宜', pinyin: 'yí', r: 1, c: 7 },
          { id: 'e1', char: '白沙浮', pinyin: 'bái shā fú', r: 1, c: 8 },
          { id: 'wai', char: '外', pinyin: 'wài', r: 0, c: 2 },
          { id: 'xiang', char: '向', pinyin: 'xiàng', r: 0, c: 3 },
          { id: 'mian', char: '面', pinyin: 'miàn', r: 4, c: 7 }
        ];

        // 增加大量干扰连线，把迷宫变成错综复杂的网，杜绝“看线猜答案”
        const edges = [
          // 正确路线
          ['s', 'ju'], ['ju', 'ji'], ['ji', 'he'], ['he', 'zuo'], ['zuo', 'yong'],
          ['yong', 'gong'], ['gong', 'ke'], ['ke', 'ben'], ['ben', 'di'], ['di', 'tu'],
          ['tu', 'hua'], ['hua', 'jia'], ['jia', 'zhang'], ['zhang', 'da'], ['da', 'li_true'],
          ['li_true', 'qi'], ['qi', 'qiu'], ['qiu', 'mi'], ['mi', 'gong2'], ['gong2', 'e2'],
          
          // 强干扰路线（制造大量循环和错误词组，如“图婆家”、“星夜”、“长大进”等）
          ['ju', 'xing1'], ['xing1', 'ye'], ['ye', 'yong'], 
          ['ji', 'wai'], ['wai', 'xiang'], ['xiang', 'tu'],
          ['he', 'li_false'], ['li_false', 'ben'], ['zuo', 'xing1'],
          ['ke', 'xing2'], ['xing2', 'qian'], ['qian', 'fang'], ['fang', 'li_true'], ['fang', 'qi'],
          ['di', 'xing2'], ['xing2', 'ye2'], ['ye2', 'mian'], ['mian', 'qiu'],
          ['tu', 'po'], ['po', 'jia'], 
          ['zhang', 'jin'], ['jin', 'yi'], ['yi', 'e1'], 
          ['da', 'ye2'], ['gong', 'li_false']
        ];

        // 唯一正确的纯汉字接龙顺序 (用于最终比对)
        const TARGET_STRING = "聚集合作用功课本地图画家长大力气球迷宫";

        function App() {
          const [path, setPath] = useState(['s']); // 记录玩家走过的所有节点ID
          const [showPinyin, setShowPinyin] = useState(false);
          const [soundEnabled, setSoundEnabled] = useState(true);
          const [toast, setToast] = useState(null);
          const [gameResult, setGameResult] = useState(null); // 'success', 'fail', null

          const currentPos = path[path.length - 1];
          const isAtExit = currentPos === 'e1' || currentPos === 'e2';

          const playSound = useCallback((type) => {
            if (!soundEnabled) return;
            try {
              const AudioContext = window.AudioContext || window.webkitAudioContext;
              if (!AudioContext) return;
              const ctx = new AudioContext();
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);

              if (type === 'move') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
              } else if (type === 'back') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
              } else if (type === 'win') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.setValueAtTime(600, ctx.currentTime + 0.2);
                osc.frequency.setValueAtTime(800, ctx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8);
                osc.start();
                osc.stop(ctx.currentTime + 0.8);
              } else if (type === 'fail') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
              }
            } catch (e) {
              console.log("Audio skipped");
            }
          }, [soundEnabled]);

          const showToastMsg = (msg) => {
            setToast(msg);
            setTimeout(() => setToast(null), 3000);
          };

          const handleNodeClick = (nodeId) => {
            if (gameResult === 'success') return;
            setGameResult(null); // 点击后重置状态

            // 1. 如果点击的是已经走过的节点，执行“后退/撤销”逻辑
            const pathIndex = path.indexOf(nodeId);
            if (pathIndex !== -1) {
              setPath(path.slice(0, pathIndex + 1));
              playSound('back');
              return;
            }

            // 2. 检查是否与当前节点相邻
            const isAdjacent = edges.some(e => 
              (e[0] === currentPos && e[1] === nodeId) || 
              (e[1] === currentPos && e[0] === nodeId)
            );

            if (isAdjacent) {
              const newPath = [...path, nodeId];
              setPath(newPath);
              playSound('move');

              // 立刻检查是否到达“宫”并且路径完全正确
              if (nodeId === 'gong2') {
                const walkedChars = newPath
                  .filter(id => id !== 's' && id !== 'e1' && id !== 'e2')
                  .map(id => nodes.find(n => n.id === id).char)
                  .join('');

                if (walkedChars === TARGET_STRING) {
                  setGameResult('success');
                  playSound('win');
                } else {
                  setGameResult('fail');
                  playSound('fail');
                  showToastMsg("❌ 路线中有不连贯的词语，或者走错了方向，请点击绿色的字后退修改！");
                }
              }
            } else {
              showToastMsg("⚠️ 只能沿着灰色的线，走到相邻的字哦！");
            }
          };

          const handleRestart = () => {
            setPath(['s']);
            setGameResult(null);
            setToast(null);
          };

          // 生成当前走过的汉字路径用于展示
          const currentPathString = path
            .filter(id => id !== 's' && id !== 'e1' && id !== 'e2')
            .map(id => nodes.find(n => n.id === id).char)
            .join(' -> ');

          return (
            <div className="min-h-screen bg-slate-100 p-4 md:p-8 font-sans flex flex-col items-center selection:bg-teal-200">
              
              {/* 顶部控制栏 */}
              <div className="w-full max-w-5xl bg-white rounded-2xl shadow-sm p-4 mb-4 flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                  <h1 className="text-2xl md:text-3xl font-black text-teal-800 flex items-center gap-2">
                    <Camera className="w-8 h-8 text-teal-500" /> 词语迷宫
                  </h1>
                  <div className="mt-2 bg-yellow-50 border-l-4 border-yellow-400 p-3 rounded-r-lg">
                    <p className="text-yellow-800 font-bold text-sm md:text-base">
                      👦 大卫发现他的相机不见了！跟着词语连一连，看他的相机在哪里。
                    </p>
                  </div>
                </div>

                <div className="flex items-center gap-2">
                  <button 
                    onClick={() => setShowPinyin(!showPinyin)} 
                    className={`px-4 py-2 rounded-xl font-bold transition ${showPinyin ? 'bg-teal-500 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                  >
                    {showPinyin ? '拼音: 开' : '拼音: 关'}
                  </button>
                  <button 
                    onClick={() => setSoundEnabled(!soundEnabled)} 
                    className="p-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-xl transition"
                  >
                    {soundEnabled ? <Volume2 className="w-6 h-6" /> : <VolumeX className="w-6 h-6" />}
                  </button>
                  <button 
                    onClick={handleRestart} 
                    className="p-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-xl transition"
                    title="重新开始"
                  >
                    <RefreshCw className="w-6 h-6" />
                  </button>
                </div>
              </div>

              {/* 游戏说明 / Instructions */}
              <div className="w-full max-w-5xl bg-sky-50 rounded-2xl p-4 md:p-5 mb-4 border border-sky-100 shadow-sm">
                <h2 className="font-black text-sky-800 mb-3 flex items-center gap-2 text-lg">
                  <Info className="w-5 h-5"/> 游戏说明 Instructions
                </h2>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4 text-sm md:text-base text-slate-700">
                  <div className="bg-white p-3 md:p-4 rounded-xl shadow-sm border border-sky-50">
                    <p className="font-bold mb-1 text-slate-800"><span className="text-sky-500 mr-1">1.</span>连词成句</p>
                    <p className="leading-snug">从起点出发，点击相邻的汉字，连成正确的词语。</p>
                    <p className="text-slate-400 text-xs mt-2 leading-tight font-medium">Start from the origin and click adjacent characters to form correct words.</p>
                  </div>
                  <div className="bg-white p-3 md:p-4 rounded-xl shadow-sm border border-sky-50">
                    <p className="font-bold mb-1 text-slate-800"><span className="text-sky-500 mr-1">2.</span>自由后退</p>
                    <p className="leading-snug">如果选错了，点击已经走过的<span className="text-teal-600 font-bold mx-1">绿色字</span>即可后退。</p>
                    <p className="text-slate-400 text-xs mt-2 leading-tight font-medium">Click the <span className="text-teal-500 font-bold">green characters</span> you've passed to step back.</p>
                  </div>
                  <div className="bg-white p-3 md:p-4 rounded-xl shadow-sm border border-sky-50">
                    <p className="font-bold mb-1 text-slate-800"><span className="text-sky-500 mr-1">3.</span>寻找相机</p>
                    <p className="leading-snug">连线走到最后一站“<span className="text-teal-600 font-bold">迷宫</span>”，即可立刻找到相机！</p>
                    <p className="text-slate-400 text-xs mt-2 leading-tight font-medium">Reach the last stop "<span className="font-bold text-teal-500">迷宫</span>" to find the camera instantly!</p>
                  </div>
                </div>
              </div>

              {/* 游戏主体区域 */}
              <div className={`relative w-full max-w-5xl h-[500px] md:h-[650px] bg-slate-50 rounded-[2rem] border-[8px] shadow-xl overflow-hidden transition-colors duration-500 ${gameResult === 'success' ? 'border-green-400 bg-green-50' : gameResult === 'fail' ? 'border-red-400 bg-red-50' : 'border-slate-300'}`}>
                
                {/* 浮动提示框 */}
                {toast && (
                  <div className="absolute top-[10%] left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl font-bold text-sm md:text-base z-50 animate-bounce whitespace-nowrap">
                    {toast}
                  </div>
                )}

                {/* 游戏结束成功遮罩 */}
                {gameResult === 'success' && (
                  <div className="absolute inset-0 z-40 bg-green-900/20 backdrop-blur-sm flex flex-col items-center justify-center animate-in fade-in duration-500">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl text-center transform scale-110 flex flex-col items-center">
                      <div className="bg-green-100 p-4 rounded-full mb-4">
                        <Camera className="w-16 h-16 text-green-500 animate-bounce" />
                      </div>
                      <h2 className="text-3xl md:text-4xl font-black text-green-500 mb-2">🎉 相机找到了，恭喜！</h2>
                      <h3 className="text-xl md:text-2xl font-bold text-green-600 mb-6">Camera found, congratulations!</h3>
                      <button onClick={handleRestart} className="bg-green-500 text-white px-8 py-3 rounded-xl font-bold text-lg hover:bg-green-600 transition shadow-lg">
                        再玩一次 Play Again
                      </button>
                    </div>
                  </div>
                )}

                {/* SVG 连线层 */}
                <svg className="absolute inset-0 w-full h-full z-0 pointer-events-none">
                  {edges.map((edge, idx) => {
                    const n1 = nodes.find(n => n.id === edge[0]);
                    const n2 = nodes.find(n => n.id === edge[1]);
                    
                    // 检查这条边是否被走过
                    const p1Idx = path.indexOf(edge[0]);
                    const p2Idx = path.indexOf(edge[1]);
                    const isWalked = p1Idx !== -1 && p2Idx !== -1 && Math.abs(p1Idx - p2Idx) === 1;

                    return (
                      <line
                        key={idx}
                        x1={`${(n1.c + 0.5) * 10}%`}
                        y1={`${(n1.r + 0.5) * (100 / 7)}%`}
                        x2={`${(n2.c + 0.5) * 10}%`}
                        y2={`${(n2.r + 0.5) * (100 / 7)}%`}
                        stroke={isWalked ? '#14b8a6' : '#cbd5e1'}
                        strokeWidth={isWalked ? '10' : '3'}
                        strokeLinecap="round"
                        className="transition-all duration-300"
                      />
                    );
                  })}
                </svg>

                {/* 节点渲染层 */}
                {nodes.map(node => {
                  const isSpecial = node.id === 's' || node.id === 'e1' || node.id === 'e2';
                  const isCurrent = currentPos === node.id;
                  const isVisited = path.includes(node.id);
                  const isStartHint = node.id === 'ju' && path.length === 1;

                  let btnClass = "absolute flex flex-col items-center justify-center font-bold transition-all duration-200 z-10 shadow-sm whitespace-nowrap ";

                  if (isSpecial) {
                    btnClass += " px-3 py-1.5 md:px-4 md:py-2 rounded-xl text-xs md:text-sm ";
                    if (node.id === 's') btnClass += " bg-blue-100 text-blue-800 border-2 border-blue-400 ";
                    else btnClass += " bg-red-100 text-red-800 border-2 border-red-400 ";
                  } else {
                    btnClass += " w-10 h-10 md:w-14 md:h-14 rounded-full text-base md:text-lg ";
                    if (isCurrent) {
                      btnClass += " bg-yellow-400 text-yellow-900 scale-125 shadow-lg ring-4 ring-yellow-200 z-30 ";
                    } else if (isVisited) {
                      btnClass += " bg-teal-500 text-white shadow-md hover:bg-teal-400 hover:scale-110 cursor-pointer z-20 ";
                    } else {
                      btnClass += " bg-white text-slate-700 border-2 border-slate-200 hover:bg-slate-50 hover:border-slate-400 hover:scale-110 cursor-pointer ";
                    }
                  }

                  if (isCurrent && isSpecial) {
                     btnClass += " ring-4 ring-yellow-400 scale-110 z-30 ";
                  }

                  if (isStartHint) {
                     btnClass += " ring-4 ring-orange-400 shadow-xl shadow-orange-200 scale-110 z-40 ";
                  }

                  return (
                    <button
                      key={node.id}
                      style={{
                        left: `${(node.c + 0.5) * 10}%`,
                        top: `${(node.r + 0.5) * (100 / 7)}%`,
                        transform: 'translate(-50%, -50%)'
                      }}
                      className={btnClass}
                      onClick={() => handleNodeClick(node.id)}
                    >
                      {isStartHint && (
                        <div className="absolute -top-10 md:-top-12 bg-orange-500 text-white text-xs md:text-sm font-black px-3 py-1.5 rounded-full whitespace-nowrap animate-bounce shadow-lg after:content-[''] after:absolute after:top-full after:left-1/2 after:-translate-x-1/2 after:border-[6px] after:border-transparent after:border-t-orange-500">
                          从“聚”开始！
                        </div>
                      )}
                      {isSpecial && <MapPin className={`w-3 h-3 md:w-4 md:h-4 absolute -top-3 md:-top-5 ${node.id === 's' ? 'text-blue-500' : 'text-red-500'}`} />}
                      <span>{node.char}</span>
                      {showPinyin && (
                        <span className="text-[10px] md:text-[12px] font-black text-black leading-none mt-0.5 md:mt-1 drop-shadow-md">
                          {node.pinyin}
                        </span>
                      )}
                    </button>
                  );
                })}
              </div>

              {/* 底部答题卡面板 */}
              <div className="w-full max-w-5xl mt-4 bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="flex-1 w-full">
                  <h3 className="text-sm font-bold text-slate-400 mb-1">📝 我的答卷 (实时路线记录)：</h3>
                  <div className="min-h-[3rem] bg-slate-50 rounded-xl border border-slate-200 p-3 flex flex-wrap gap-x-2 gap-y-1 items-center font-bold text-slate-700 text-sm md:text-base">
                    <span className="text-blue-500">起点</span>
                    {currentPathString ? (
                      <Fragment>
                        <span className="text-slate-400">➔</span>
                        <span>{currentPathString}</span>
                      </Fragment>
                    ) : null}
                    {isAtExit && <Fragment><span className="text-slate-400">➔</span><span className="text-red-500">终点</span></Fragment>}
                  </div>
                </div>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
